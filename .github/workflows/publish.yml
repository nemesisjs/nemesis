# ══════════════════════════════════════════════════════════════════════════════
#  Publish: @nemesisjs/* monorepo packages
#
#  What this does:
#    1. Builds every package under packages/.
#    2. Rewrites "workspace:*" deps to real semver ranges in each package.json
#       (npm doesn't understand Bun workspace references).
#    3. Publishes each package to npm with public access.
#
#  How to trigger:
#    Actions tab → "Publish Packages" → Run workflow
#    Use the "dry_run" input to do a full rehearsal without actually publishing.
#
#  Required secret:
#    NPM_TOKEN  — a npm "Automation" token with publish rights
# ══════════════════════════════════════════════════════════════════════════════

name: Publish Packages

# ── Trigger ───────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build without publishing to npm"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Safety: never allow two publish runs at the same time ─────────────────────
concurrency:
  group: publish-monorepo
  cancel-in-progress: false

# ── Minimal GitHub token permissions ─────────────────────────────────────────
permissions:
  contents: read

# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ── Build & Publish ──────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node is required for `npm publish` even though we build with Bun.
      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      # "workspace:*" is a Bun/pnpm concept that npm does not understand.
      # This step rewrites every workspace reference to "^<package-version>"
      # using a safe inline Node script (no fragile sed regex).
      - name: Rewrite workspace:* references to real semver ranges
        run: |
          for pkg_dir in packages/*/; do
            pkg_json="${pkg_dir}package.json"
            [ -f "$pkg_json" ] || continue

            node -e "
              const fs  = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg_json', 'utf8'));
              const ver = pkg.version;
              let changed = 0;
              for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
                for (const [name, val] of Object.entries(pkg[section] ?? {})) {
                  if (val === 'workspace:*') {
                    pkg[section][name] = '^' + ver;
                    changed++;
                  }
                }
              }
              fs.writeFileSync('$pkg_json', JSON.stringify(pkg, null, 2) + '\n');
              if (changed) console.log('  Rewrote ' + changed + ' workspace dep(s) in $pkg_json');
            "
          done

      # Publish every package that has a package.json.
      # Already-published versions are silently skipped (not treated as errors).
      - name: Publish packages to npm
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          PUBLISHED=()
          SKIPPED=()

          for pkg_dir in packages/*/; do
            [ -f "${pkg_dir}package.json" ] || continue

            PKG_NAME=$(node -p "require('./${pkg_dir}package.json').name")
            PKG_VER=$(node  -p "require('./${pkg_dir}package.json').version")

            echo "──────────────────────────────────────────"
            echo "  Package : $PKG_NAME"
            echo "  Version : $PKG_VER"
            echo "  Path    : $pkg_dir"

            if [ "$DRY_RUN" = "true" ]; then
              echo "  Result  : skipped (dry run)"
              SKIPPED+=("$PKG_NAME@$PKG_VER (dry run)")

            elif (cd "$pkg_dir" && npm publish --access public 2>&1); then
              echo "  Result  : ✓ published"
              PUBLISHED+=("$PKG_NAME@$PKG_VER")

            else
              echo "  Result  : ⚠ skipped (version already exists on npm)"
              SKIPPED+=("$PKG_NAME@$PKG_VER")
            fi
          done

          # Final summary
          echo ""
          echo "══════════════════════════════════════════"
          echo "  Publish summary"
          echo "  Published : ${#PUBLISHED[@]}"
          for p in "${PUBLISHED[@]}"; do echo "    ✓  $p"; done
          echo "  Skipped   : ${#SKIPPED[@]}"
          for s in "${SKIPPED[@]}"; do echo "    –  $s"; done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
