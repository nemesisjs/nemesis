name: Publish Packages

on:
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        if: github.repository_owner == github.actor
        steps:
            - uses: actions/checkout@v4
              with:
                  path: nemesisjs
            - uses: actions/checkout@v4
              with:
                  repository: nemesisjs/cli
                  path: cli
            - uses: actions/checkout@v4
              with:
                  repository: nemesisjs/validation
                  path: validation

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: |
                  cd nemesisjs
                  bun install --no-cache

            - name: Build packages
              run: |
                  cd nemesisjs
                  bun run build

            - name: Publish Packages
              run: |
                  cd nemesisjs
                  for pkg in packages/*; do
                    if [ -d "$pkg" ] && [ -f "$pkg/package.json" ]; then
                      echo "Publishing $pkg"
                      cd "$pkg"
                      
                      # Replace workspace:* with the actual version of the package safely
                      VERSION=$(grep '"version"' package.json | head -n 1 | sed -E 's/.*"version": "(.*)",/\1/')
                      sed -i "s/\"workspace:\*\"/\"^${VERSION}\"/g" package.json
                      
                      npm publish --access public || echo "Publishing $pkg failed (version may already exist)"
                      
                      cd ../..
                    fi
                  done
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
